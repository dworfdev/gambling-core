<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chroma Gambling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="toast-container"></div>

<header id="header">
  <div class="header-row">
    <span class="logo">CHROMA</span>
    <div class="header-stats">
      <span>ID: <b id="p-id">—</b></span>
      <span>Balance: <b id="p-balance">—</b></span>
    </div>
    <button class="btn-refresh" onclick="loadData()">↻</button>
  </div>
  <div class="wallet-line" id="p-wallet">Wallet not linked</div>
</header>

<main id="app">

  <!-- ── Screen: Bind Wallet ── -->
  <section id="screen-wallet" class="screen" style="display:none">
    <h1 class="screen-title">Link Wallet</h1>
    <p class="hint">Enter your TON address for deposits and payouts. Set once.</p>
    <div class="card">
      <input id="wallet-input" type="text" placeholder="UQ... or EQ..." autocomplete="off">
      <button class="btn-primary" onclick="saveWallet()">Confirm</button>
    </div>
  </section>

  <!-- ── Screen: Main (Game) ── -->
  <section id="screen-main" class="screen" style="display:none">

    <div class="card balance-card">
      <p class="label">Your Balance</p>
      <div id="balance" class="balance-amount">—</div>
      <div class="balance-actions">
        <button class="btn-green" onclick="navToPayment('deposit'); setActiveNav('nav-wallet')">Deposit</button>
        <button class="btn-blue"  onclick="navToPayment('cashout'); setActiveNav('nav-wallet')">Withdraw</button>
      </div>
    </div>

    <div id="dice-stage">
      <img id="dice-wheel"   src="/wheel.png" alt="">
      <img id="dice-overlay" src="/overlay_arrow.png" alt="">
    </div>

    <div class="bet-row">
      <input id="bet-amount" type="number" value="10" min="1" placeholder="Bet">
      <button class="btn-spin" id="spin-btn" onclick="playDice()">SPIN!</button>
    </div>

    <div id="dice-outcome" class="dice-outcome">READY</div>

    <button id="admin-btn" class="btn-ghost-inline" onclick="showScreen('admin'); setActiveNav('nav-admin')" style="display:none">Admin Panel</button>

  </section>

  <!-- ── Screen: Payment ── -->
  <section id="screen-pay" class="screen" style="display:none">

    <div class="screen-header-row">
      <button class="btn-back" onclick="navigateAway('main')">‹ Back</button>
      <h1 id="pay-title" class="screen-title-inline">Payment</h1>
    </div>

    <div class="card balance-card">
      <p class="label">Your Balance</p>
      <div id="pay-balance-display" class="balance-amount small">—</div>
    </div>

    <div class="card">
      <input id="pay-amount" type="number" placeholder="Amount (USDT)" min="0.01" step="0.01">
      <p class="hint">Available: <span id="pay-balance-hint">—</span> · Minimum $10</p>
      <button class="btn-primary" id="pay-exec-btn">Send</button>
    </div>

  </section>

  <!-- ── Screen: Admin ── -->
  <section id="screen-admin" class="screen" style="display:none">

    <h1 class="screen-title">Admin Panel</h1>

    <div class="card stats-card">
      <div class="stat-item">
        <p class="label">Total Users</p>
        <p class="stat-value" id="stat-users">—</p>
      </div>
    </div>

    <div class="filter-row">
      <input id="admin-target-tgid" type="number" placeholder="Player tgId (blank = all)">
      <button class="btn-blue-sm" onclick="loadPending()">Load</button>
    </div>

    <h2 class="section-title">Transaction History</h2>

    <div id="pending-list" class="pending-list">
      <span class="hint">Transactions not loaded</span>
    </div>

  </section>

</main>

<nav id="bottom-nav">
  <button class="nav-item active" id="nav-main" onclick="navigateAway('main'); setActiveNav('nav-main')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Main</span>
  </button>
  <button class="nav-item" id="nav-wallet" onclick="navToPayment('deposit'); setActiveNav('nav-wallet')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
    </svg>
    <span>Wallet</span>
  </button>
  <button class="nav-item" id="nav-admin" onclick="showScreen('admin'); setActiveNav('nav-admin')" style="display:none">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
    </svg>
    <span>Admin</span>
  </button>
</nav>

<script src="script.js"></script>
</body>
</html>
